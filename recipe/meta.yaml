{% set name = "colicoords" %}
{% set version = "0.1.5" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: b9d4335751929c494fbe1f6ebebd0cc8f7addda86cccad01244f1edf00de0a4d

build:
  number: 2
  noarch: python
  script: "{{ PYTHON }} -m pip install . --no-deps -vv"

requirements:
  host:
    - python {{ python_min }}
    - pip
    - pbr >=1.9
  run:
    - python >={{ python_min }}
    - numpy
    - matplotlib-base >=2.2.0
    - seaborn
    - mahotas
    - multiprocess
    - scipy
    - h5py
    - tifffile
    - tqdm >=4.27.0
    - symfit >=0.4.6
    - ipywidgets
    - IPython

test:
  requires:
    - python {{ python_min }}
  imports:
    - colicoords

about:
  home: https://github.com/Jhsmit/ColiCoords
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Single-cell fluorescence microscopy data analysis
  doc_url: https://colicoords.readthedocs.io/
  dev_url: https://github.com/Jhsmit/ColiCoords

extra:
  recipe-maintainers:
    - jhsmit
